<head>

            background: #222;
            color: white;
            outline: none;
        }

            padding: 10px 14px;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            color: white;
        }

        #focusBtn { background: #2d6cdf; }

        #status {

            color: #ccc;
            white-space: nowrap;
        }

        .toggleWrap {

            align-items: center;
            gap: 12px;
            padding: 8px 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
        }

        .toggleWrap label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #eee;
            cursor: pointer;
            user-select: none;
        }

        .toggleWrap input[type="checkbox"] {
            transform: scale(1.1);
            cursor: pointer;
        }

        #plotWrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none;
            overscroll-behavior: none;
        }

        #networkPlot .plot-container,
        #networkPlot .svg-container,
        #networkPlot .main-svg {
            width: 100vw !important;
            height: 100vh !important;
            touch-action: none !important;
        }

        #zoomControls {
            position: absolute;
            left: 50%;
            bottom: 14px;
            transform: translateX(-50%);
            z-index: 1000;
            width: min(88vw, 520px);
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.72);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.35);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #zoomLabel {
            font-size: 14px;
            color: #ddd;
            white-space: nowrap;
        }

        #zoomSlider {
            flex: 1 1 auto;
            width: 100%;
            accent-color: #2d6cdf;
        }

        #zoomValue {
            min-width: 58px;
            text-align: right;
            font-size: 13px;
            color: #ddd;
        }

        @media (max-width: 768px) {
            #controls {
                top: 8px;
                left: 8px;
                right: 8px;
                padding: 8px 10px;
                gap: 6px;
            }

            #nameSearch {
                font-size: 16px;
                min-width: 140px;
            }

            #focusBtn, #resetBtn {
                font-size: 14px;
                padding: 9px 12px;
            }

            #status {
                font-size: 12px;
                white-space: normal;
            }

            .toggleWrap {
                width: 100%;
                justify-content: flex-start;
                flex-wrap: wrap;
            }

            #zoomControls {
                width: min(92vw, 560px);
                bottom: 10px;
                padding: 10px 12px;
            }

            #zoomLabel {
                font-size: 13px;
            }

            #zoomValue {
                font-size: 12px;
                min-width: 52px;
            }
        }
    </style>
</head>

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)

            let newMag = currentMag / factor;
            const MIN_MAG = 0.15;

                z: dir.z * newMag

                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            highlightConnectedEdges(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]]
            }, [connectedEdgeTraceIndex]);

            setCameraAndKeepOrientation({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            resetSliderDisplay();
            status.textContent = "View reset.";
        }

        window.addEventListener("load", function() {
            toggleGMM.checked = SHOW_GMM_BY_DEFAULT;
            toggleSVM.checked = SHOW_SVM_BY_DEFAULT;

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTraceVisibility(gmmTraceIndex, toggleGMM.checked);
            setSVMVisibility(toggleSVM.checked);

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                resetSliderDisplay();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            if (sliderLock) return;

            const factor = parseFloat(zoomSlider.value);
            setZoomText(factor);

            if (Math.abs(factor - 1.0) < 1e-6) return;

            applyRelativeZoom(factor);
            resetSliderDisplay();
        });

        toggleGMM.addEventListener("change", function() {
            setTraceVisibility(gmmTraceIndex, this.checked);
            status.textContent = this.checked ? "GMM shown." : "GMM hidden.";
        });

        toggleSVM.addEventListener("change", function() {
            setSVMVisibility(this.checked);
            status.textContent = this.checked ? "SVM boundaries shown." : "SVM boundaries hidden.";
        });

        // Intentionally no plot click handler.
    </script>
</body>
</html>
