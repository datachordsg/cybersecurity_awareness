ishing and using security features like 2FA.\u003cbr\u003e\u003cbr\u003e2. Priority cybersecurity topics\u003cbr\u003e- Course 1: Foundation Cybersecurity for ethical hacking and network scanning.\u003cbr\u003e- Course 2: Intermediate Cybersecurity for social engineering and malware detection.\u003cbr\u003e- Course 3: Advanced Cybersecurity for penetration testing and evading security systems.\u003cbr\u003e\u003cbr\u003e3. Priority data science topics\u003cbr\u003e- Module 1: Introduction to Data Science and AI for AI fundamentals in cybersecurity.\u003cbr\u003e- Module 4: Machine Learning for AI Application for anomaly detection.\u003cbr\u003e- Module 6: Graph Theory for Cybersecurity for attack graph analytics.\u003cbr\u003e\u003cbr\u003e4. Recommended pathway\u003cbr\u003e- Begin with Course 1 and Module 1 to build foundational skills.\u003cbr\u003e- Progress to Course 2 and Module 4 for intermediate techniques.\u003cbr\u003e- Advance to Course 3 and Module 6 for specialized skills.\u003cbr\u003e\u003cbr\u003e5. Why this pathway fits\u003cbr\u003e- Aligns with the group's interest in cybersecurity awareness and practical skills.\u003cbr\u003e- Supports their confidence in recognizing threats and using security features.\u003cbr\u003e- Provides a structured approach to integrate cybersecurity with data science analytics.\u003c\u002fspan\u003e","\u003cspan style='display:block;max-width:320px;white-space:normal;word-break:break-word;overflow-wrap:anywhere;line-height:1.25;font-size:12px;'\u003e\u003cb\u003eDo Tr\u003c\u002fb\u003e\u003cbr\u003eConnections: 3\u003cbr\u003e\u003cbr\u003eEligible for collective group-level training-needs analysis.\u003cbr\u003e\u003cbr\u003e\u003cb\u003eGroup 1\u003c\u002fb\u003e\u003cbr\u003eMembers: Do Tr, Dr William Soo, GuS CHUI, Jacky, Kanegishweri, LimTB\u003cbr\u003e\u003cbr\u003e\u003cb\u003eGroup training needs\u003c\u002fb\u003e\u003cbr\u003e1. **Group learning profile**\u003cbr\u003e   - High awareness of cybersecurity impo         const DEFAULT_EYE = {"x": 1.7, "y": 1.7, "z": 1.3};
        const DEFAULT_UP = {"x": 0, "y": 0, "z": 1};
        const SHOW_GMM_BY_DEFAULT = true;
        const SHOW_SVM_BY_DEFAULT = false;

        const plot = document.getElementById("networkPlot");
        const datalist = document.getElementById("nameList");
        const searchInput = document.getElementById("nameSearch");
        const status = document.getElementById("status");
        const zoomSlider = document.getElementById("zoomSlider");
        const zoomValue = document.getElementById("zoomValue");
        const toggleGMM = document.getElementById("toggleGMM");
        const toggleSVM = document.getElementById("toggleSVM");

        // Trace indices:
        // 0 = edge trace
        // 1 = edge hover trace
        // 2 = highlighted connected-edge trace
        // 3 = real node trace
        // 4 = simulated white node trace (GMM)
        // 5 = highlight node trace
        // 6 = node label trace
        // 7+ = svm line traces
        const connectedEdgeTraceIndex = 2;
        const gmmTraceIndex = 4;
        const highlightTraceIndex = 5;
        const svmStartTraceIndex = 7;

        let sliderLock = false;

        function eyeMagnitude(eye) {
            return Math.sqrt(
                Math.pow(eye.x || 0, 2) +
                Math.pow(eye.y || 0, 2) +
                Math.pow(eye.z || 0, 2)
            );
        }

        function cloneEye(eye) {
            return {
                x: Number(eye.x || 0),
                y: Number(eye.y || 0),
                z: Number(eye.z || 0)
            };
        }

        function cloneCenter(center) {
            return {
                x: Number((center && center.x) || 0),
                y: Number((center && center.y) || 0),
                z: Number((center && center.z) || 0)
            };
        }

        function cloneUp(up) {
            return {
                x: Number((up && up.x) || DEFAULT_UP.x),
                y: Number((up && up.y) || DEFAULT_UP.y),
                z: Number((up && up.z) || DEFAULT_UP.z)
            };
        }

        function normalizeEye(eye) {
            const mag = eyeMagnitude(eye);
            if (mag === 0) return cloneEye(DEFAULT_EYE);
            return {
                x: eye.x / mag,
                y: eye.y / mag,
                z: eye.z / mag
            };
        }

        function currentCamera() {
            const cam = (plot.layout && plot.layout.scene && plot.layout.scene.camera)
                ? plot.layout.scene.camera
                : null;

            return {
                eye: cam && cam.eye ? cloneEye(cam.eye) : cloneEye(DEFAULT_EYE),
                center: cam && cam.center ? cloneCenter(cam.center) : {x: 0, y: 0, z: 0},
                up: cam && cam.up ? cloneUp(cam.up) : cloneUp(DEFAULT_UP)
            };
        }

        function setZoomText(scale) {
            zoomValue.textContent = Number(scale).toFixed(2) + "×";
        }

        function resetSliderDisplay() {
            sliderLock = true;
            zoomSlider.value = "1.00";
            setZoomText(1.00);
            setTimeout(() => {
                sliderLock = false;
            }, 0);
        }

        function applyRelativeZoom(factor) {
            const cam = currentCamera();
            const currentMag = eyeMagnitude(cam.eye);
            const dir = normalizeEye(cam.eye);

            let newMag = currentMag / factor;
            const MIN_MAG = 0.15;
            const MAX_MAG = 20.0;
            newMag = Math.max(MIN_MAG, Math.min(MAX_MAG, newMag));

            const newEye = {
                x: dir.x * newMag,
                y: dir.y * newMag,
                z: dir.z * newMag
            };

            Plotly.relayout(plot, {
                "scene.camera.eye": newEye,
                "scene.camera.center": cam.center,
                "scene.camera.up": cam.up,
                "scene.dragmode": "orbit"
            });
        }

        function setCameraAndKeepOrientation(cameraObj) {
            Plotly.relayout(plot, {
                "scene.camera.eye": cameraObj.eye,
                "scene.camera.center": cameraObj.center,
                "scene.camera.up": cameraObj.up,
                "scene.dragmode": "orbit"
            });
        }

        function highlightConnectedEdges(label) {
            const edges = connectedEdgesLookup[label] || [];

            if (edges.length === 0) {
                Plotly.restyle(plot, {
                    x: [[null]],
                    y: [[null]],
                    z: [[null]]
                }, [connectedEdgeTraceIndex]);
                return;
            }

            const xs = [];
            const ys = [];
            const zs = [];

            for (const e of edges) {
                xs.push(e.x0, e.x1, null);
                ys.push(e.y0, e.y1, null);
                zs.push(e.z0, e.z1, null);
            }

            Plotly.restyle(plot, {
                x: [xs],
                y: [ys],
                z: [zs]
            }, [connectedEdgeTraceIndex]);
        }

        function setTraceVisibility(traceIndex, visibleFlag) {
            Plotly.restyle(plot, {
                visible: visibleFlag ? true : "legendonly"
            }, [traceIndex]);
        }

        function setSVMVisibility(visibleFlag) {
            const totalTraces = plot.data.length;
            const svmIndices = [];
            for (let i = svmStartTraceIndex; i < totalTraces; i++) {
                svmIndices.push(i);
            }
            if (svmIndices.length > 0) {
                Plotly.restyle(plot, {
                    visible: visibleFlag ? true : "legendonly"
                }, svmIndices);
            }
        }

        nodeLabels.slice().sort((a, b) => a.localeCompare(b)).forEach(label => {
            const opt = document.createElement("option");
            opt.value = label;
            datalist.appendChild(opt);
        });

        function findMatchingLabel(query) {
            if (!query) return null;
            const q = query.trim().toLowerCase();

            for (const label of nodeLabels) {
                if (label.toLowerCase() === q) return label;
            }
            for (const label of nodeLabels) {
                if (label.toLowerCase().includes(q)) return label;
            }
            return null;
        }

        function highlightByLabel(label) {
            const pt = nodeLookup[label];
            if (!pt) {
                status.textContent = "Name not found.";
                return;
            }

            Plotly.restyle(plot, {
                x: [[pt.x]],
                y: [[pt.y]],
                z: [[pt.z]],
                text: [[label]],
                textposition: [["top center"]],
                marker: [{
                    size: [Math.max(38, pt.size * 2.2)],
                    color: ["rgba(255,0,0,0.95)"],
                    line: {
                        width: 8,
                        color: "rgba(255,255,255,1)"
                    },
                    symbol: "circle"
                }],
                textfont: [{
                    size: 20,
                    color: "#ffffff"
                }]
            }, [highlightTraceIndex]);

            searchInput.value = label;
        }

        function focusOnNode() {
            const raw = searchInput.value;
            const matched = findMatchingLabel(raw);

            if (!matched) {
                status.textContent = "Name not found.";
                return;
            }

            highlightByLabel(matched);
            highlightConnectedEdges(matched);
            status.textContent = "Highlighted: " + matched;
        }

        function resetView() {
            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]],
                text: [[""]],
                marker: [{
                    size: [0],
                    color: ["rgba(0,0,0,0)"],
                    line: {
                        width: 0,
                        color: "rgba(0,0,0,0)"
                    }
                }]
            }, [highlightTraceIndex]);

            Plotly.restyle(plot, {
                x: [[null]],
                y: [[null]],
                z: [[null]]
            }, [connectedEdgeTraceIndex]);

            setCameraAndKeepOrientation({
                eye: cloneEye(DEFAULT_EYE),
                center: {x: 0, y: 0, z: 0},
                up: cloneUp(DEFAULT_UP)
            });

            resetSliderDisplay();
            status.textContent = "View reset.";
        }

        window.addEventListener("load", function() {
            toggleGMM.checked = SHOW_GMM_BY_DEFAULT;
            toggleSVM.checked = SHOW_SVM_BY_DEFAULT;

            Plotly.relayout(plot, {
                "scene.dragmode": "orbit"
            });

            setTraceVisibility(gmmTraceIndex, toggleGMM.checked);
            setSVMVisibility(toggleSVM.checked);

            setTimeout(function() {
                Plotly.Plots.resize(plot);
                resetSliderDisplay();
            }, 350);
        });

        window.addEventListener("resize", function() {
            Plotly.Plots.resize(plot);
        });

        document.getElementById("focusBtn").addEventListener("click", focusOnNode);
        document.getElementById("resetBtn").addEventListener("click", resetView);

        searchInput.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                focusOnNode();
            }
        });

        zoomSlider.addEventListener("input", function() {
            if (sliderLock) return;

            const factor = parseFloat(zoomSlider.value);
            setZoomText(factor);

            if (Math.abs(factor - 1.0) < 1e-6) return;

            applyRelativeZoom(factor);
            resetSliderDisplay();
        });

        toggleGMM.addEventListener("change", function() {
            setTraceVisibility(gmmTraceIndex, this.checked);
            status.textContent = this.checked ? "GMM shown." : "GMM hidden.";
        });

        toggleSVM.addEventListener("change", function() {
            setSVMVisibility(this.checked);
            status.textContent = this.checked ? "SVM boundaries shown." : "SVM boundaries hidden.";
        });

        // Intentionally no plot click handler.
    </script>
